kind = "web"
previewPath = "/"
title = "Numérologie Humaniste"
version = "1.0.0"
id = "artifacts/numerologie"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22406

[services.development]
run = "pnpm --filter @workspace/numerologie run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/numerologie", "run", "build" ]
publicDir = "artifacts/numerologie/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22406"
BASE_PATH = "/"
